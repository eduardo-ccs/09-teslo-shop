@if(productResorce.isLoading()){
<div class="flex justify-center items-center h-screen">
  <span class="loading loading-spinner loading-lg"></span>
</div>
} @if( productResorce.hasValue()){
<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
  <!-- Imagenes -->

  <product-carousel [images]="productResorce.value().images" />

  <div class="">
    <h2 class="text-2xl font-bold font-montserat">
      {{ productResorce.value().title }}
    </h2>
    <div class="divider"></div>

    <p>
      {{ productResorce.value().description }}
    </p>
  </div>
</div>
}
